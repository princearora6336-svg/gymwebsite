<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PowerFit Gym</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#0f172a;color:white}
header{display:flex;justify-content:space-between;align-items:center;padding:20px 50px;background:#020617}
header h1{color:#22c55e}
nav a{margin:0 15px;color:white;text-decoration:none}
.hero{height:80vh;background:url('https://images.unsplash.com/photo-1554284126-aa88f22d8b74') center/cover no-repeat;display:flex;align-items:center;justify-content:center}
.hero h2{background:rgba(0,0,0,0.6);padding:20px;border-radius:10px}
.section{padding:50px;text-align:center}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.card{background:#1e293b;padding:20px;border-radius:10px}
.card img{width:100%}
.btn{margin-top:10px;padding:10px 20px;background:#22c55e;border:none;cursor:pointer}
.cart{position:fixed;top:20px;right:20px;background:#22c55e;padding:10px;border-radius:50%}
</style>
</head>
<body>
<header>
<h1>PowerFit</h1>
<nav>
<a href="#">Home</a>
<a href="#shop">Shop</a>
</nav>
</header>

<div class="cart">🛒 <span id="count">0</span></div>

<section class="hero"><h2>Buy Gym Accessories</h2></section>

<section class="section" id="shop">
<h2>Gym Accessories</h2>
<div class="cards">

<div class="card">
<img src="https://images.unsplash.com/photo-1598970434795-0c54fe7c0642">
<h3>Dumbbells</h3>
<p>₹999</p>
<button class="btn" onclick="addToCart()">Add to Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1599058917212-d750089bc07e">
<h3>Gym Belt</h3>
<p>₹799</p>
<button class="btn" onclick="addToCart()">Add to Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1605296867424-35fc25c9212a">
<h3>Deadlift Band</h3>
<p>₹499</p>
<button class="btn" onclick="addToCart()">Add to Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1583454110551-21f2fa2afe61">
<h3>Hand Gripper</h3>
<p>₹299</p>
<button class="btn" onclick="addToCart()">Add to Cart</button>
</div>

</div>
</section>

<script>
let count = 0;
function addToCart(){
  count++;
  document.getElementById('count').innerText = count;
}
</script>

</body>
</html>
